name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish"
        required: true
        type: string

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

permissions:
  contents: write

jobs:
  verify:
    name: verify release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Start MongoDB playground
        run: docker compose -f dev/mongodb/docker-compose.yml up -d

      - name: Wait for MongoDB
        run: |
          for i in {1..30}; do
            if docker compose -f dev/mongodb/docker-compose.yml exec -T mongodb \
              mongosh --quiet --eval "db.runCommand({ ping: 1 })" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f dev/mongodb/docker-compose.yml logs
          exit 1

      - name: Format
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy --workspace -- -D warnings

      - name: Test
        env:
          LAZYCOMPASS_PLAYGROUND: "1"
          LAZYCOMPASS_MONGO_URI: mongodb://localhost:27017
        run: cargo test --workspace

      - name: Build workspace
        run: cargo build --workspace

      - name: Audit
        run: cargo audit

      - name: Stop MongoDB playground
        if: always()
        run: docker compose -f dev/mongodb/docker-compose.yml down -v

  prepare_release:
    name: prepare draft release
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Validate release metadata
        run: |
          version="${RELEASE_TAG#v}"
          if [ -z "$version" ] || [ "$version" = "$RELEASE_TAG" ]; then
            echo "invalid release tag: $RELEASE_TAG" >&2
            exit 1
          fi

          manifests=(
            lazycompass-cli/Cargo.toml
            lazycompass-core/Cargo.toml
            lazycompass-mongo/Cargo.toml
            lazycompass-output/Cargo.toml
            lazycompass-storage/Cargo.toml
            lazycompass-tui/Cargo.toml
          )

          observed=""
          for manifest in "${manifests[@]}"; do
            current=$(sed -n 's/^version = "\(.*\)"/\1/p' "$manifest" | head -n1)
            if [ -z "$current" ]; then
              echo "unable to read version from $manifest" >&2
              exit 1
            fi
            if [ -z "$observed" ]; then
              observed="$current"
            elif [ "$observed" != "$current" ]; then
              echo "crate versions do not match: $observed vs $current ($manifest)" >&2
              exit 1
            fi
          done

          if [ "$observed" != "$version" ]; then
            echo "tag version $version does not match crate version $observed" >&2
            exit 1
          fi

          if ! grep -q "^## \[$version\] - " CHANGELOG.md; then
            echo "CHANGELOG.md is missing a section for $version" >&2
            exit 1
          fi

      - name: Extract release notes
        run: |
          version="${RELEASE_TAG#v}"
          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\] - " { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "release notes for $version are empty" >&2
            exit 1
          fi

      - name: Ensure draft release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --title "$RELEASE_TAG" --notes-file release-notes.md
            exit 0
          fi
          gh release create "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --draft --title "$RELEASE_TAG" --notes-file release-notes.md

  build:
    name: build (${{ matrix.target }})
    needs: prepare_release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: lazycompass-linux-x64.tar.gz
            binary: lazycompass
            archive_format: tar.gz
          - os: macos-14
            target: x86_64-apple-darwin
            archive: lazycompass-darwin-x64.tar.gz
            binary: lazycompass
            archive_format: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive: lazycompass-darwin-arm64.tar.gz
            binary: lazycompass
            archive_format: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: lazycompass-windows-x64.zip
            binary: lazycompass.exe
            archive_format: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release -p lazycompass --target ${{ matrix.target }}

      - name: Package tarball
        if: ${{ matrix.archive_format == 'tar.gz' }}
        run: |
          tar -czf ${{ matrix.archive }} -C target/${{ matrix.target }}/release ${{ matrix.binary }}
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum ${{ matrix.archive }} > ${{ matrix.archive }}.sha256
          else
            shasum -a 256 ${{ matrix.archive }} > ${{ matrix.archive }}.sha256
          fi

      - name: Package zip and checksum
        if: ${{ matrix.archive_format == 'zip' }}
        shell: pwsh
        run: |
          Compress-Archive -LiteralPath "target/${{ matrix.target }}/release/${{ matrix.binary }}" -DestinationPath "${{ matrix.archive }}"
          $hash = (Get-FileHash -Algorithm SHA256 "${{ matrix.archive }}").Hash.ToLowerInvariant()
          "$hash  ${{ matrix.archive }}" | Out-File -Encoding ascii "${{ matrix.archive }}.sha256"

      - name: Import GPG key (optional)
        id: import_gpg
        shell: bash
        env:
          RELEASE_GPG_PRIVATE_KEY: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
          RELEASE_GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
        run: |
          if [ -z "$RELEASE_GPG_PRIVATE_KEY" ] || [ -z "$RELEASE_GPG_PASSPHRASE" ]; then
            echo "fingerprint=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          printf '%s' "$RELEASE_GPG_PRIVATE_KEY" | gpg --batch --import
          key_fpr=$(gpg --list-secret-keys --with-colons | awk -F: '$1=="fpr"{print $10; exit}')
          echo "fingerprint=$key_fpr" >> "$GITHUB_OUTPUT"

      - name: Sign checksum (optional)
        if: ${{ steps.import_gpg.outputs.fingerprint != '' }}
        shell: bash
        env:
          RELEASE_GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
        run: |
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$RELEASE_GPG_PASSPHRASE" \
            --local-user "${{ steps.import_gpg.outputs.fingerprint }}" \
            --output ${{ matrix.archive }}.sha256.sig \
            --detach-sign ${{ matrix.archive }}.sha256

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" ${{ matrix.archive }} ${{ matrix.archive }}.sha256 --clobber

      - name: Upload signature (optional)
        if: ${{ steps.import_gpg.outputs.fingerprint != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" ${{ matrix.archive }}.sha256.sig --clobber

  publish_release:
    name: publish release
    needs:
      - prepare_release
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --draft=false --latest
